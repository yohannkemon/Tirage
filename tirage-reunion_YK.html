<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage au sort — Réunion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f4f8;
    --card: #ffffff;
    --border: #e0e0ea;
    --accent: #5b4af7;
    --accent2: #0ea5c8;
    --text: #1a1a2e;
    --muted: #8888a8;
    --danger: #e03050;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(91,74,247,0.07) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(14,165,200,0.06) 0%, transparent 50%);
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 0.3rem;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    text-align: center;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    width: 100%;
    max-width: 860px;
  }

  @media (max-width: 600px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
  }

  .panel-title {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    transition: all 0.15s;
  }

  .btn-add {
    background: var(--accent);
    color: #fff;
    padding: 0.6rem 1rem;
    font-size: 1.1rem;
    line-height: 1;
  }
  .btn-add:hover { background: #1a1a2e; }

  .participants-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    max-height: 260px;
    overflow-y: auto;
    padding-right: 2px;
  }
  .participants-list::-webkit-scrollbar { width: 4px; }
  .participants-list::-webkit-scrollbar-track { background: transparent; }
  .participants-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .participant-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.8rem;
    font-size: 0.9rem;
    gap: 0.5rem;
    transition: all 0.2s;
  }
  .participant-chip.spoken {
    opacity: 0.35;
    text-decoration: line-through;
    border-color: transparent;
  }
  .participant-chip.selected {
    border-color: var(--accent);
    background: rgba(91,74,247,0.08);
    color: var(--accent);
  }

  .chip-name { flex: 1; }

  .btn-remove {
    background: transparent;
    color: var(--muted);
    padding: 0 0.2rem;
    font-size: 1rem;
    line-height: 1;
  }
  .btn-remove:hover { color: var(--danger); }

  .empty-state {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    text-align: center;
    padding: 2rem 0;
  }

  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .winner-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    text-align: center;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .winner-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .winner-name {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
    line-height: 1.1;
  }
  .winner-name.rolling { animation: roll 0.05s infinite; }
  @keyframes roll {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .winner-name.pop { animation: pop 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .winner-placeholder {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
  }

  .btn-draw {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    border-radius: var(--radius);
    letter-spacing: 0.02em;
  }
  .btn-draw:hover:not(:disabled) { background: #1a1a2e; transform: translateY(-1px); }
  .btn-draw:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-reset {
    width: 100%;
    padding: 0.6rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    border-radius: var(--radius);
  }
  .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

  .stats-row { display: flex; gap: 0.5rem; }
  .stat {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem;
    text-align: center;
  }
  .stat-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
  .stat-num.yellow { color: var(--accent); }
  .stat-num.cyan { color: var(--accent2); }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .history {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .history span {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.15rem 0.5rem;
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    top: -10px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="confetti-container" id="confetti"></div>

<h1>Tirage au sort <span>&#9889;</span></h1>
<p class="subtitle">R&eacute;unions Teams &mdash; Qui parle maintenant&nbsp;?</p>

<div class="layout">

  <!-- Gauche : participants -->
  <div class="panel">
    <div class="panel-title">Participants</div>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Luc, Marie, Paul&hellip;">
      <button class="btn-add" id="btnAdd">+</button>
    </div>
    <div class="participants-list" id="list"></div>
    <div id="cameraBanner" style="margin-top:1rem;background:var(--bg);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:10px;padding:0.75rem 1rem;display:flex;align-items:flex-start;gap:0.6rem;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:700;color:var(--text);line-height:1.45;">
      <span style="font-size:1.1rem;flex-shrink:0;">🎥</span>
      <span id="cameraMsg"></span>
    </div>
  </div>

  <!-- Droite : tirage -->
  <div class="right-panel">
    <div class="panel" style="padding:1rem 1.2rem 1.2rem;">
      <div class="panel-title">Tirage</div>
      <div class="winner-box">
        <div id="winnerPlaceholder" class="winner-placeholder">En attente&hellip;</div>
        <div id="winnerLabel" class="winner-label" style="display:none">&#192; la parole :</div>
        <div id="winnerName" class="winner-name" style="display:none"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0.6rem;margin-top:0.8rem;">
        <button class="btn-draw" id="btnDraw" disabled>&#127922; Tirer au sort</button>
        <button class="btn-reset" id="btnReset">&#8635; Nouvelle r&eacute;union</button>
      </div>
    </div>

    <div class="panel" style="padding:1rem 1.2rem;">
      <div class="panel-title">Session</div>
      <div class="stats-row" style="margin-bottom:0.8rem;">
        <div class="stat">
          <div class="stat-num yellow" id="statTotal">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-num cyan" id="statSpoken">0</div>
          <div class="stat-label">Ont parl&eacute;</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="statLeft">0</div>
          <div class="stat-label">Restants</div>
        </div>
      </div>
      <div class="panel-title">Ordre du tour</div>
      <div class="history" id="history"></div>
    </div>
  </div>

</div>

<script>
var participants = [];
var spokenOrder  = [];
var rolling      = false;
var lastWinner   = null;

document.getElementById('btnAdd').addEventListener('click', addParticipant);
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addParticipant();
});
document.getElementById('btnDraw').addEventListener('click', drawPerson);
document.getElementById('btnReset').addEventListener('click', resetRound);

function addParticipant() {
  var input = document.getElementById('nameInput');
  var raw = input.value.trim();
  if (!raw) return;

  var names = raw.split(',').map(function(n) { return n.trim(); }).filter(function(n) { return n.length > 0; });
  var hasDuplicate = false;

  names.forEach(function(name) {
    var exists = participants.some(function(p) { return p.name.toLowerCase() === name.toLowerCase(); });
    if (exists) {
      hasDuplicate = true;
    } else {
      participants.push({ name: name, spoken: false });
    }
  });

  if (hasDuplicate) {
    input.style.borderColor = 'var(--danger)';
    setTimeout(function() { input.style.borderColor = ''; }, 1000);
  }

  input.value = '';
  input.focus();
  render();
}

function removeParticipant(name) {
  participants = participants.filter(function(p) { return p.name !== name; });
  if (lastWinner === name) lastWinner = null;
  render();
}

function drawPerson() {
  var available = participants.filter(function(p) { return !p.spoken; });
  if (!available.length || rolling) return;

  rolling = true;
  document.getElementById('btnDraw').disabled = true;

  var elName        = document.getElementById('winnerName');
  var elLabel       = document.getElementById('winnerLabel');
  var elPlaceholder = document.getElementById('winnerPlaceholder');

  elPlaceholder.style.display = 'none';
  elLabel.style.display       = 'block';
  elName.style.display        = 'block';
  elName.classList.remove('pop');
  elName.classList.add('rolling');

  var ticks      = 0;
  var totalTicks = 18 + Math.floor(Math.random() * 10);

  var interval = setInterval(function() {
    var rand = available[Math.floor(Math.random() * available.length)];
    elName.textContent = rand.name;
    ticks++;

    if (ticks >= totalTicks) {
      clearInterval(interval);

      var final = available[Math.floor(Math.random() * available.length)];
      elName.textContent = final.name;
      elName.classList.remove('rolling');
      elName.classList.add('pop');

      // Marquer comme ayant parlé
      for (var i = 0; i < participants.length; i++) {
        if (participants[i].name === final.name) {
          participants[i].spoken = true;
          break;
        }
      }
      spokenOrder.push(final.name);
      lastWinner = final.name;
      rolling = false;

      renderList();
      renderStats();
      renderHistory();

      var remaining = participants.filter(function(p) { return !p.spoken; }).length;
      document.getElementById('btnDraw').disabled = (remaining === 0);

      launchConfetti();
    }
  }, 60);
}

function resetRound() {
  participants.forEach(function(p) { p.spoken = false; });
  spokenOrder = [];
  lastWinner  = null;
  rolling     = false;

  document.getElementById('winnerPlaceholder').style.display = 'block';
  document.getElementById('winnerLabel').style.display       = 'none';
  document.getElementById('winnerName').style.display        = 'none';

  render();
}

function render() {
  renderList();
  renderStats();
  renderHistory();
  var avail = participants.filter(function(p) { return !p.spoken; }).length;
  document.getElementById('btnDraw').disabled = (avail === 0 || rolling);
}

function renderList() {
  var list = document.getElementById('list');
  list.innerHTML = '';
  if (!participants.length) {
    list.innerHTML = '<div class="empty-state">Ajoutez des participants &#8593;</div>';
    return;
  }
  participants.forEach(function(p) {
    var chip = document.createElement('div');
    chip.className = 'participant-chip' +
      (p.spoken    ? ' spoken'   : '') +
      (p.name === lastWinner ? ' selected' : '');

    var safeName = p.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    chip.innerHTML =
      '<span class="chip-name">' + (p.spoken ? '&#10003; ' : '') + escHtml(p.name) + '</span>' +
      '<button class="btn-remove" onclick="removeParticipant(\'' + safeName + '\')">&#10005;</button>';
    list.appendChild(chip);
  });
}

function renderStats() {
  var total  = participants.length;
  var spoken = participants.filter(function(p) { return p.spoken; }).length;
  document.getElementById('statTotal').textContent  = total;
  document.getElementById('statSpoken').textContent = spoken;
  document.getElementById('statLeft').textContent   = total - spoken;
}

function renderHistory() {
  var el = document.getElementById('history');
  if (!spokenOrder.length) {
    el.innerHTML = '<span style="color:var(--muted);border:none;padding:0">Aucun tour effectu&eacute;</span>';
    return;
  }
  el.innerHTML = spokenOrder.map(function(n, i) {
    return '<span>' + (i + 1) + '. ' + escHtml(n) + '</span>';
  }).join('');
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function launchConfetti() {
  var container = document.getElementById('confetti');
  container.innerHTML = '';
  var colors = ['#5b4af7','#0ea5c8','#f040a0','#22c55e','#f59e0b'];
  for (var i = 0; i < 38; i++) {
    var c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left             = (Math.random() * 100) + 'vw';
    c.style.background       = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius     = Math.random() > 0.5 ? '50%' : '0';
    c.style.animationDuration = (0.8 + Math.random() * 1.2) + 's';
    c.style.animationDelay   = (Math.random() * 0.4) + 's';
    c.style.transform        = 'rotate(' + Math.floor(Math.random() * 360) + 'deg)';
    container.appendChild(c);
  }
  setTimeout(function() { container.innerHTML = ''; }, 2500);
}

render();

// Message aléatoire affiché en bandeau statique
(function() {
  var messages = [
    "Petit check système : merci d'activer votre webcam.exe pour que le meeting passe en mode humain v2.0.",
    "Si vous êtes encore en pyjama, on promet de ne pas faire de capture d'écran… mais allumez vos caméras quand même 😄",
    "Pour vérifier que vous n'êtes pas remplacés par des bots IA, merci d'activer votre caméra.",
    "Activez les caméras, promis on ne vous demandera pas de partager votre écran… enfin pas tout de suite.",
    "On passe le meeting en mode collaboratif avancé : caméras ON 🎥",
    "Merci d'activer les caméras pour passer de \"conf call\" à \"vraie équipe\".",
    "Les caméras OFF, ça donne l'impression de parler à des fantômes. On a peur des fantômes.",
    "Allumez la caméra — même votre chat est le bienvenu à l'écran.",
    "La caméra, c'est le sourire de la réunion. Et vous avez un super sourire.",
    "On ne vous demande pas d'être coiffés. Juste visibles. Enfin… essayez quand même.",
    "Les réunions sont 47 % plus fun quand on voit les vraies têtes. Statistique totalement inventée, mais on y croit.",
    "Activation caméra en cours… parce qu'une voix sans visage, c'est un podcast, pas une réunion."
  ];
  document.getElementById('cameraMsg').textContent = messages[Math.floor(Math.random() * messages.length)];
})();
</script>
</body>
</html>
